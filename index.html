<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宏观形势分析报告</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-sub: #f7f8fa;
      --border: #e2e5ea;
      --text: #1a1a2e;
      --text-sub: #5a5f72;
      --text-muted: #9096a6;
      --blue: #2563eb;
      --blue-light: #eff4ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.6;
    }

    /* ── Top Nav ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar .logo {
      font-size: 16px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }
    .topbar .logo span { font-size: 18px; }
    .topbar .nav-links {
      display: flex; align-items: center; gap: 6px;
    }
    .topbar .nav-links a {
      font-size: 12px; color: var(--text-sub); text-decoration: none;
      padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border);
      transition: all 0.15s;
    }
    .topbar .nav-links a:hover { background: var(--blue-light); color: var(--blue); border-color: var(--blue); }
    .topbar .nav-links a.current {
      background: var(--blue); color: #fff; border-color: var(--blue);
    }

    /* ── Sidebar + Content Layout ── */
    .layout {
      display: flex; min-height: calc(100vh - 49px);
    }
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--bg-sub); border-right: 1px solid var(--border);
      padding: 20px 0; overflow-y: auto;
      position: sticky; top: 49px; height: calc(100vh - 49px);
    }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .topbar .nav-links { flex-wrap: wrap; }
    }
    .sidebar .s-title {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      letter-spacing: 2px; padding: 0 16px; margin-bottom: 10px;
    }
    .sidebar .s-list { list-style: none; }
    .sidebar .s-list li { }
    .sidebar .s-list a {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; font-size: 13px; color: var(--text-sub);
      text-decoration: none; transition: all 0.15s;
      border-left: 3px solid transparent;
    }
    .sidebar .s-list a:hover { background: rgba(37,99,235,0.04); color: var(--blue); }
    .sidebar .s-list a.active {
      background: var(--blue-light); color: var(--blue);
      border-left-color: var(--blue); font-weight: 600;
    }
    .sidebar .s-list .date-label {
      font-family: 'SF Mono','Fira Code',monospace; font-size: 12px;
    }
    .sidebar .s-list .new-badge {
      font-size: 9px; background: var(--blue); color: #fff;
      padding: 1px 5px; border-radius: 3px; font-weight: 600;
    }

    /* ── Main Content ── */
    .main {
      flex: 1; min-width: 0;
    }
    .main iframe {
      width: 100%; height: calc(100vh - 49px); border: none;
    }

    /* ── Empty State ── */
    .empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: calc(100vh - 49px);
      color: var(--text-muted); font-size: 14px;
    }
    .empty .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo"><span>📊</span> 宏观形势分析报告</div>
  <div class="nav-links" id="navLinks">
    <!-- JS动态填充 -->
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="s-title">📅 历史报告</div>
    <ul class="s-list" id="sideList">
      <!-- JS动态填充 -->
    </ul>
  </div>
  <div class="main" id="mainContent">
    <!-- iframe 或 empty state -->
  </div>
</div>

<script>
// ═══ 报告列表配置 ═══
// 每次新增报告时，在这里追加一条即可
const REPORTS = [
  { date: '2026-04-10', file: 'reports/macro-analysis-20260410.html', label: '4月10日' },
  // 新报告追加到数组开头（最新在前）
];

// ═══ 渲染逻辑 ═══
const params = new URLSearchParams(window.location.search);
const selectedDate = params.get('date') || (REPORTS.length > 0 ? REPORTS[0].date : null);

function render() {
  const navLinks = document.getElementById('navLinks');
  const sideList = document.getElementById('sideList');
  const mainContent = document.getElementById('mainContent');

  if (REPORTS.length === 0) {
    mainContent.innerHTML = '<div class="empty"><div class="icon">📭</div><div>暂无报告</div></div>';
    return;
  }

  // Top nav: 只显示最近5期
  const recentReports = REPORTS.slice(0, 5);
  navLinks.innerHTML = recentReports.map((r, i) => {
    const isCurrent = r.date === selectedDate;
    return `<a href="?date=${r.date}" class="${isCurrent ? 'current' : ''}">${r.label}</a>`;
  }).join('');

  // Sidebar
  sideList.innerHTML = REPORTS.map((r, i) => {
    const isActive = r.date === selectedDate;
    const isNew = i === 0;
    return `<li>
      <a href="?date=${r.date}" class="${isActive ? 'active' : ''}">
        <span class="date-label">${r.date}</span>
        ${isNew ? '<span class="new-badge">最新</span>' : ''}
      </a>
    </li>`;
  }).join('');

  // Main: iframe
  const report = REPORTS.find(r => r.date === selectedDate) || REPORTS[0];
  mainContent.innerHTML = `<iframe src="${report.file}" title="${report.label}报告"></iframe>`;
}

render();
</script>

</body>
</html>
